# ============================================================
# UFDR Analysis Tool - Prometheus Alert Rules
# ============================================================
#
# Alert rules for monitoring UFDR Analysis Tool.
# 
# Usage:
#   Add to Prometheus configuration:
#   rule_files:
#     - 'prometheus_alerts.yml'
#
# ============================================================

groups:
  # ============================================================
  # System Resource Alerts
  # ============================================================
  
  - name: system_resources
    interval: 30s
    rules:
      # High CPU Usage
      - alert: HighCPUUsage
        expr: ufdr_system_cpu_usage_percent > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% (threshold: 80%)"
          
      - alert: CriticalCPUUsage
        expr: ufdr_system_cpu_usage_percent > 95
        for: 2m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is {{ $value }}% (threshold: 95%)"
      
      # High Memory Usage
      - alert: HighMemoryUsage
        expr: ufdr_system_memory_percent > 80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% (threshold: 80%)"
          
      - alert: CriticalMemoryUsage
        expr: ufdr_system_memory_percent > 90
        for: 2m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is {{ $value }}% (threshold: 90%)"
      
      # High Disk Usage
      - alert: HighDiskUsage
        expr: ufdr_system_disk_percent > 80
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High disk usage detected"
          description: "Disk usage is {{ $value }}% (threshold: 80%)"
          
      - alert: CriticalDiskUsage
        expr: ufdr_system_disk_percent > 90
        for: 5m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical disk usage detected"
          description: "Disk usage is {{ $value }}% (threshold: 90%)"
  
  # ============================================================
  # Application Health Alerts
  # ============================================================
  
  - name: application_health
    interval: 30s
    rules:
      # Application Down
      - alert: ApplicationDown
        expr: up{job="ufdr_analysis_tool"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "UFDR Analysis Tool is down"
          description: "The application has been down for more than 1 minute"
      
      # High Error Rate
      - alert: HighErrorRate
        expr: rate(ufdr_requests_total{status="error"}[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} requests/sec (threshold: 0.1)"
      
      # Process Restarted
      - alert: ApplicationRestarted
        expr: ufdr_uptime_seconds < 300
        for: 1m
        labels:
          severity: info
          component: application
        annotations:
          summary: "Application recently restarted"
          description: "Application uptime is only {{ $value }} seconds"
  
  # ============================================================
  # Performance Alerts
  # ============================================================
  
  - name: performance
    interval: 1m
    rules:
      # Slow Request Processing
      - alert: SlowRequestProcessing
        expr: histogram_quantile(0.95, rate(ufdr_api_request_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: performance
        annotations:
          summary: "Slow request processing detected"
          description: "95th percentile latency is {{ $value }}s (threshold: 5s)"
      
      # High Request Rate
      - alert: HighRequestRate
        expr: rate(ufdr_requests_total[1m]) > 100
        for: 5m
        labels:
          severity: info
          component: performance
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value }} requests/sec"
  
  # ============================================================
  # Business Logic Alerts
  # ============================================================
  
  - name: business_logic
    interval: 1m
    rules:
      # High Alert Generation Rate
      - alert: HighAlertGenerationRate
        expr: rate(ufdr_business_alerts_generated[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: business
        annotations:
          summary: "High rate of alerts being generated"
          description: "Alert generation rate is {{ $value }} alerts/sec (threshold: 10)"
      
      # No Cases Processed
      - alert: NoCasesProcessed
        expr: rate(ufdr_business_cases_processed[1h]) == 0
        for: 2h
        labels:
          severity: warning
          component: business
        annotations:
          summary: "No cases processed in the last 2 hours"
          description: "The system may be idle or experiencing issues"
      
      # High Cross-Case Linkage Rate
      - alert: HighCrossCaseLinkageRate
        expr: rate(ufdr_business_cross_case_links_found[10m]) > 50
        for: 10m
        labels:
          severity: info
          component: business
        annotations:
          summary: "High rate of cross-case linkages detected"
          description: "Linkage rate is {{ $value }} links/sec - possible data quality issue or anomaly"
  
  # ============================================================
  # Process Health Alerts
  # ============================================================
  
  - name: process_health
    interval: 30s
    rules:
      # High Process Memory
      - alert: HighProcessMemory
        expr: ufdr_process_memory_rss_bytes > 8589934592  # 8 GB
        for: 10m
        labels:
          severity: warning
          component: process
        annotations:
          summary: "High process memory usage"
          description: "Process memory is {{ $value | humanize }}B (threshold: 8GB)"
      
      # Too Many Threads
      - alert: TooManyThreads
        expr: ufdr_process_threads > 100
        for: 5m
        labels:
          severity: warning
          component: process
        annotations:
          summary: "High number of threads"
          description: "Process has {{ $value }} threads (threshold: 100)"

